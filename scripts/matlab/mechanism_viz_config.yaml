# 机构装配可视化配置（阶段 A.2.5）
# Per-mechanism, per-instance joint-variable overrides for visualize_mechanism.m.
#
# 结构：mechanism 名 → 实例名 → 关节变量取值映射。
#   顶层键 = DSL 的 mechanism 字段（如 open_chain_2r）。
#   二层键 = DSL instances 中的实例名（如 joint1）。
#   三层键 = 该实例模块内关节的 variable 名（revolute→q，prismatic→dx/dy/dz）。
#
# 未列出的关节变量默认取 0（零位）。几何参数（cubeLength、tipDistance 等）
# 不在此文件中，仍由 <module_library>/config/parameters.yaml 按 module_type 提供。

# 开环 2R 链：给两个转动副非零角，展示自由度与变换传播。
open_chain_2r:
  joint1:
    q: 0.5236      # +30° = pi/6
  joint2:
    q: -0.7854     # -45° = -pi/4

# 单闭环四杆机构：默认全零（零位=四杆展平呈直线，回路最大张开）。
# 补边（closed）端口在零位并不重合——mate 报告会显示该 chord 的闭环残差
# （直线构型下约 80mm），正是 A.4 需要求解归零的约束量；树边残差恒为 0。
single_closed_loop:
  jointAB:
    q: 0
  jointBC:
    q: 0
  jointCD:
    q: 0
  jointDA:
    q: 0

# 三支链并联雏形：默认全零（各支链沿正交轴展平）。两条 closed 补边在零位
# 亦不重合，mate 报告显示各自的闭环残差（约 40√2 ≈ 56.6mm），留待 A.4 求解。
parallel_prototype:
  j1a:
    q: 0
  j1b:
    q: 0
  j2a:
    q: 0
  j2b:
    q: 0
  j3a:
    q: 0
  j3b:
    q: 0
