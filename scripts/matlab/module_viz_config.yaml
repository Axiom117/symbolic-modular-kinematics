# 模块可视化参数注入配置
# Parameter-injection config for visualize_module.m / visualize_all_modules.m.
#
# 按 module_type 分组。每组提供：
#   - 模块类参数的数值（如 cubeLength、tipDistance），用于把符号平移
#     （如 cubeLength/2、-tipDistance）解析为数字。
#   - 可选的关节变量值（如 q），用于摆出某个姿态展示自由度。
# 空模块写 {} 表示无需注入参数。

Frame:
  cubeLength: 10

Pin: {}

Joint:
  q: 0.5236        # 30° = pi/6，展示转动副自由度（默认 0 为零位）

Adaptor: {}

Pipette_body:
  tipDistance: 20
