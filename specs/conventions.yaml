# 阶段 A.0 建模约定常量（机器可读）
# 与 ../modeling-conventions.md 一致。修改两者必须同步。
# 解释器与校验器以本文件为权威常量来源。
version: 0
status: frozen

# 层级架构（自底向上四层，见 modeling-conventions.md §2）
hierarchy:
  L0: { name: Element, content: [body, frame, port, fixedTransform, joint, constraint] }
  L1: { name: Module, role: parameterized_template, instantiable: true, exposes_only: port }
  L2: { name: Mechanism, content: module_instances + connections, graph: [tree, general] }
  L3: { name: Execution, content: [world_frame, drivers], closes_system: true }

naming:
  element_types: lowerCamelCase
  module_types: UpperCamelCase
  instance_names: [lowerCamelCase, snake_case]
  parameter_names: lowerCamelCase
  fixed_keywords: [body, frame, port, fixedTransform, joint, constraint]

# 建模原语：模块/机构/IR 只能由这些元件组合而成
element_types:
  nodes:
    body: { dof: 0, geometry_host: true, center_frame: true, fields: [name, geometry?] }
    frame: { dof: 0, host: body, fields: [name, host, exposed?, semantic_tag?, polarity?, symmetry?, observable?] }   # Port = exposed:true; 位姿由 fixedTransform 给出；observable 标记是否纳入解释器输出
  edges:
    fixedTransform: { dof: 0, fields: [from_frame, to_frame, translation, rotation] }
    joint: { dof_min: 1, kinds: [revolute, prismatic], fields: [from_frame, to_frame, kind, axis, variable, limit?, observable?] }  # actuated 在执行层指派，非模块字段；observable 标记变量值是否纳入解释器输出
    constraint: { generated_phase: A4, in_module_def: false, fields: [frame_pair, components] }

coordinate_system:
  handedness: right
  world_root: world
  axes:
    x: forward
    y: lateral
    z: up
  gravity_dir: [0, 0, -1]

units:
  length: mm
  angle_internal: rad
  angle_input: [deg, rad]      # 输入允许，必须显式标注；内部统一 rad
  require_boundary_unit_tag: true

rotation:
  positive_rule: right_hand
  authoritative: axis_angle    # 轴角 (omega, q) 用于关节与内部 IR
  display: euler_zyx           # R = Rz(psi)*Ry(theta)*Rx(phi)
  quaternion_order: [w, x, y, z]
  compose_order: translate_then_rotate   # p_parent = t + R*p_local

port:
  is_exposed_frame: true       # Port = exposed:true 的 frame，非独立元件
  placement_via: fixedTransform
  semantic_tag_affects_kinematics: false
  name_pattern: '^(face[XYZ][+-]|[a-zA-Z][a-zA-Z0-9_]*)$'
  unique_per_module: true
  semantic_tags: [connector, joint_side, tool, dock, ground]   # ground = world 侧接地 frame（Manipulator，无 polarity，由 L3 绑定 world）
  mating_normal: +Z_outward    # 所有 port 的 +Z 统一为朝模块外的对插法向（§9.1）
  polarity_values: [socket, plug]   # socket = 凹面钢片（Frame 六面 + Manipulator 驱动口）；plug = 贴到 socket 上的凸面磁铁
  polarity_optional: true      # 任务/工具参考系（如 tip_origin）不带 polarity，不参与机械连接
  default_symmetry: 4          # 绕 +Z 的旋转对称阶；缺省 4（方钢片 C4），约束连接 roll 离散取值

connection:
  types: [coincident]            # 唯一合法连接类型；重定义为「标准 mate 翻转后贴合」（见 modeling-conventions.md §10）
  max_use_per_port: 1
  allow_dangling: false        # 悬空端口须显式标记
  forbid_axis_conflict: true
  polarity_rule: socket_plug_only   # 仅允许 socket↔plug；socket↔socket、plug↔plug、无 polarity 端口均非法
  mate_transform: 'Rz(roll*360/symmetry) * Rx(pi)'   # 子(plug)相对父(socket)：Rx(pi) 面对面翻转 + Rz 离散滚转，平移 0
  mate_flip_axis: X            # 冻结：mate 翻转绕 port +X 转 180°（+Z→-Z 反平行，+Y 翻转，+X 不变）
  roll:
    discrete: true             # 仅离散；真正连续转动须用 revolute Joint 模块表达
    unit: symmetry_step         # 整数步进索引 k，实际角 = k * 360/symmetry 度
    default: 0
    valid: 'integer in 0..symmetry-1'
  roll_continuous_via: Joint   # 需要运行时连续绕法向转动 → 插入 revolute Joint 模块（真自由度）

parameter_scopes: [module-class, instance, mechanism-config]
allow_symbolic_expressions: true

# 执行层（L3）：把机构本体接入世界系与驱动源，闭合成可求解系统
execution:
  configurations: [closed_loop, open_loop]
  # 变量注册与分区（见 modeling-conventions.md §3.6）：
  #   A.3 IR 展开时收集所有 observable frame/joint → variableRegistry
  #   用户在 execution config 中将 registry 分区为 known（已知输入）/ unknown（待求输出）
  #   分区决定求解方向：FK = known:actuated, unknown:endFrame；IK = known:endFrame, unknown:actuated
  variable_registry:
    source: observable          # registry 来源：frame.observable:true + joint.observable:true
    partition: [known, unknown] # 用户分区；不内置 FK/IK mode
  closed_loop:
    drivers: external          # 外部驱动器提供多自由度驱动；由 Manipulator 模块物化（§2.4、§5.6）
    driver_module: Manipulator # 外部驱动 = Manipulator 关节模块（3-DOF 笛卡尔 = 三个 prismatic）
    world_binding: manipulator_ground_frame   # L3 把 Manipulator.ground(无 polarity) 绑定到 world
    loop: [world, external_driver, mechanism, external_driver, world]
    closure_criteria: relative_pose_residual   # 回路切口的相对位姿误差分量
    output: ik_residual
  open_loop:
    drivers: actuated_joints    # 关节自身可驱动，无需外部驱动器，如 3R 链
    root: world
    output: fk_expression
