# 开环 2R 链可视化配置（阶段 A.2.5）
# Per-instance joint-variable overrides for viz/mechanism.m.
#
# 结构：实例名 → 关节变量取值映射。
#   顶层键 = DSL instances 中的实例名（如 joint1）。
#   二层键 = 该实例模块内关节的 variable 名（revolute→q，prismatic→dx/dy/dz）。
#
# 未列出的关节变量默认取 0（零位）。几何参数（cubeLength、tipDistance 等）
# 不在此文件中，仍由 <module_library>/config/dimensions.yaml 按 module_type 提供。

joint1:
  q: 0.5236      # +30° = pi/6
joint2:
  q: -0.7854     # -45° = -pi/4
