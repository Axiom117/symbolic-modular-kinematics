# yaml-language-server: $schema=../../schema/mechanism-assembly.schema.yaml
# 示例：三支链并联雏形（parallel_prototype）
# 阶段 A.2.3 验证目标：多支链 FK 传播、多切口约束构造（类比 MRF 2.4 构型）。
#
# 结构：固定基座平台（baseHub）与运动平台（platformHub）之间由三条并联支链连接，
# 每条支链为「Joint — Frame(连杆) — Joint」串联。运动平台顶面挂工具（pipette）。
# 三条支链连接同两个刚体 → 独立回路数 = 3 − 1 = 2，故支链 2、支链 3 的闭合连接
# 标 closed:true（支链 1 视作树枝，选哪两条作补边不影响物理等价性，见
# connection-semantics.md §6.3）。
#
# 拓扑图（Mermaid）：
#   graph TD
#     baseHub -->|faceXPlus| j1a --> link1 --> j1b -->|faceXMinus| platformHub
#     baseHub -->|faceYPlus| j2a --> link2 --> j2b -.->|closed| platformHub
#     baseHub -->|faceZPlus| j3a --> link3 --> j3b -.->|closed| platformHub
#     platformHub -->|faceZPlus ~ connector_side| pipette
#
# 符号变量表（实例限定名）：
#   j1a.q, j1b.q —— 支链 1 两铰点角度（rad，observable）
#   j2a.q, j2b.q —— 支链 2 两铰点角度（rad，observable）
#   j3a.q, j3b.q —— 支链 3 两铰点角度（rad，observable）
#   pipette.tip_origin —— 末端工具任务系（observable，FK/IK 输出候选）
#
# 说明：baseHub 如何接地到 world、endFrame 指定、各关节 actuated/unknown 分区、
# 每个切口须归零的分量子集均属 L3 execution-config，不在本 DSL 中声明。

dsl_version: 0
mechanism: parallel_prototype
description: 三支链并联雏形（固定基座 + 运动平台 + 三条 2R 支链 + 工具），验证多支链传播与多切口约束。
module_library: ../../../modules/

instances:
  baseHub:
    type: Frame
  platformHub:
    type: Frame
  pipette:
    type: ToolPipette
  # 支链 1
  j1a:
    type: Joint
  link1:
    type: Frame
  j1b:
    type: Joint
  # 支链 2
  j2a:
    type: Joint
  link2:
    type: Frame
  j2b:
    type: Joint
  # 支链 3
  j3a:
    type: Joint
  link3:
    type: Frame
  j3b:
    type: Joint

connections:
  # --- 支链 1（树枝，不闭合）：baseHub.faceXPlus → platformHub.faceXMinus ---
  - ports: [baseHub.faceXPlus, j1a.linkA]
  - ports: [j1a.linkB, link1.faceXMinus]
  - ports: [link1.faceXPlus, j1b.linkA]
  - ports: [j1b.linkB, platformHub.faceXMinus]
  # --- 支链 2（补边）：baseHub.faceYPlus → platformHub.faceYMinus ---
  - ports: [baseHub.faceYPlus, j2a.linkA]
  - ports: [j2a.linkB, link2.faceXMinus]
  - ports: [link2.faceXPlus, j2b.linkA]
  - ports: [j2b.linkB, platformHub.faceYMinus]
    closed: true
  # --- 支链 3（补边）：baseHub.faceZPlus → platformHub.faceZMinus ---
  - ports: [baseHub.faceZPlus, j3a.linkA]
  - ports: [j3a.linkB, link3.faceXMinus]
  - ports: [link3.faceXPlus, j3b.linkA]
  - ports: [j3b.linkB, platformHub.faceZMinus]
    closed: true
  # --- 末端工具挂在运动平台顶面 ---
  - ports: [platformHub.faceZPlus, pipette.connector_side]
