# yaml-language-server: $schema=../schema/module-definition.schema.yaml
# 模块：Pin（销钉连接件）
# 参考来源：mrex_hypercube_modules.slx → system_15.xml
# 数据权威来源：modeling-conventions.md §5.2、module_library_reference.md
#
# 注意：sideA/sideB 的精确朝向在参考摘要中标注「待 A.1 从 SLX 提取」。
# 当前 SLX 二进制不在工作区，故两端口旋转标记为 pending（未冻结）；
# 平移已知为零。extraction_status 因此为 partial。

module_type: Pin
category: structural
dof: 0
geometry: assets/connector_dowel_pin.step
description: 双端销钉连接件，仅做坐标重定向、无平移、无自由度。
source: mrex_hypercube_modules.slx#system_15
extraction_status: partial

bodies:
  - name: body
    geometry: assets/pin_connector.stl

# --- 端口框架表（两端均 plug，贴到 Frame 的 socket 上）---
frames:
  - { name: sideA, host: body, exposed: true, semantic_tag: connector, polarity: plug }
  - { name: sideB, host: body, exposed: true, semantic_tag: connector, polarity: plug }

# --- 内部运动学图（平移已知为零，旋转待 SLX 提取）---
fixed_transforms:
  - from_frame: body
    to_frame: sideA
    translation: [0, 0, 0]
    rotation: { align: { a: ["+Z", "+Y"], b: ["+X", "+Z"] } }
  - from_frame: body
    to_frame: sideB
    translation: [0, 0, 0]
    rotation: { align: { a: ["+Z", "-Y"], b: ["+X", "+Z"] } }

