# yaml-language-server: $schema=../schema/module-definition.schema.yaml
# 模块：Pipette_body（工具末端件）
# 参考来源：mrex_hypercube_modules.slx → system_32.xml
# 数据权威来源：modeling-conventions.md §5.5、module_library_reference.md
#
# 工具模块：connector_side 为结构连接面，tip_origin 为工具尖端参考原点
# （EndFrame 候选）。两端口平移已知；参考摘要未给出朝向（无 align 规则），
# 故旋转以 pending/provisional 占位，extraction_status 为 partial。

module_type: Pipette_body
category: structural
dof: 0
geometry: assets/tool.STEP
description: 单主体工具末端件，暴露结构连接面与工具尖端参考原点。
source: mrex_hypercube_modules.slx#system_32
extraction_status: partial

# --- 模块定义表 · 参数 ---
parameters:
  - name: tipDistance
    unit: mm
    description: 工具尖端沿 -Z 距 body 中心的距离。

bodies:
  - name: body
    geometry: assets/tool.STEP

# --- 端口框架表（connector_side 为机械对接面 plug；tip_origin 为任务系，无极性）---
frames:
  - { name: connector_side, host: body, exposed: true, semantic_tag: connector, polarity: plug }
  - { name: tip_origin, host: body, exposed: true, semantic_tag: tool }

# --- 内部运动学图 · 固定变换（平移已知；朝向待 SLX 提取）---
fixed_transforms:
  - from_frame: body
    to_frame: connector_side
    translation: [0, 5, 25]
    rotation: { pending: true }
    provisional: true
    note: connector_side 朝向待从 SLX system_32 精确提取（参考仅给出平移）。
  - from_frame: body
    to_frame: tip_origin
    translation: [0, 0, -tipDistance]
    rotation: { pending: true }
    provisional: true
    note: tip_origin 朝向待从 SLX system_32 精确提取（参考仅给出平移）。
